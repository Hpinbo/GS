<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>砚拓·管理员后台</title>
    <link rel="preconnect" href="https://static.cloudbase.net">
    <script src="https://static.cloudbase.net/cloudbase-js-sdk/latest/cloudbase.full.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #f5f7fa; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        h2 { margin-bottom: 16px; color: #1e2a3a; font-size: 1.4rem; }
        .stats { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; }
        .stat-card { background: #f8f9fc; border-radius: 20px; padding: 16px; min-width: 150px; }
        .stat-number { font-size: 1.8rem; font-weight: bold; color: #2c3e50; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ecf0f1; }
        th { background: #f8f9fc; font-weight: 600; }
        button {
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 0.9rem;
            display: none;
            z-index: 2000;
        }
        .form-group { margin-bottom: 16px; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #dce3ec;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        .add-salesman { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
        .add-salesman .form-group { flex: 1; min-width: 150px; margin-bottom: 0; }
        .add-salesman button { margin-bottom: 0; }
    </style>
</head>
<body>
    <div class="container" id="mainContainer" style="display: none;">
        <div class="card">
            <h2>管理员控制台</h2>
            <div style="text-align: right;">
                <button onclick="logout()">退出登录</button>
            </div>
        </div>

        <div class="card">
            <h2>添加销售员</h2>
            <div class="add-salesman">
                <div class="form-group">
                    <label>姓名</label>
                    <input type="text" id="newName" placeholder="姓名">
                </div>
                <div class="form-group">
                    <label>手机号</label>
                    <input type="tel" id="newPhone" placeholder="手机号">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="text" id="newPassword" placeholder="密码" value="123456">
                </div>
                <div class="form-group">
                    <label>级别</label>
                    <select id="newLevel">
                        <option value="1">一级销售员（市）</option>
                        <option value="2">二级销售员（区县）</option>
                        <option value="3">三级销售员（街道）</option>
                    </select>
                </div>
                <button onclick="addSalesman()" style="margin-top: 22px;">添加销售员</button>
            </div>
        </div>

        <div class="card">
            <h2>整体统计</h2>
            <div id="stats" class="stats"></div>
        </div>
        <div class="card">
            <h2>销售员列表</h2>
            <div style="overflow-x: auto;">
                <table id="salesTable">
                    <thead>
                        <tr><th>ID</th><th>姓名</th><th>手机号</th><th>级别</th><th>上级ID</th><th>录入商家数</th><th>操作</th>……
                    </thead>
                    <tbody id="salesList">……
                ……
            </div>
        </div>
        <div class="card">
            <h2>所有商家</h2>
            <div style="overflow-x: auto;">
                <table id="allCustomersTable">
                    <thead>
                        <tr><th>店名</th><th>地址</th><th>电话</th><th>类目</th><th>备注</th><th>录入销售员</th><th>录入时间</th>……
                    </thead>
                    <tbody id="allCustomersList">……
                ……
            </div>
            <button onclick="exportCSV()" style="margin-top: 16px;">导出CSV</button>
        </div>
    </div>
    <div id="toast" class="toast"></div>

    <script>
        (function() {
            const CLOUD_ENV = 'good-reviews-3g35hh0i28b88e1b';
            let db = null;
            let isCloudReady = false;

            function showToast(msg) {
                var toast = document.getElementById('toast');
                toast.textContent = msg;
                toast.style.display = 'block';
                setTimeout(function() {
                    toast.style.display = 'none';
                }, 3000);
            }

            async function initCloud() {
                try {
                    var app = cloudbase.init({ env: CLOUD_ENV });
                    await app.auth().signInAnonymously();
                    db = app.database();
                    isCloudReady = true;
                    console.log('云数据库初始化成功');
                } catch (err) {
                    console.error('云数据库初始化失败', err);
                    alert('初始化失败：' + (err.message || '请检查环境ID或匿名登录是否开启'));
                    isCloudReady = false;
                }
            }

            async function loadData() {
                if (!db) return;
                try {
                    var salesRes = await db.collection('sales').get();
                    var sales = salesRes.data.filter(function(s) { return s.salesId !== 'admin'; });
                    var customersRes = await db.collection('customers').get();
                    var customers = customersRes.data;

                    var countMap = new Map();
                    customers.forEach(function(c) {
                        countMap.set(c.salesId, (countMap.get(c.salesId) || 0) + 1);
                    });

                    var salesTbody = document.getElementById('salesList');
                    if (sales.length === 0) {
                        salesTbody.innerHTML = '<tr><td colspan="7">暂无销售员数据</td></tr>';
                    } else {
                        var salesHtml = '';
                        for (var i = 0; i < sales.length; i++) {
                            var s = sales[i];
                            var levelText = s.level === 1 ? '一级（市）' : (s.level === 2 ? '二级（区县）' : '三级（街道）');
                            salesHtml += '<tr>';
                            salesHtml += '<td>' + escapeHtml(s.salesId) + '</td>';
                            salesHtml += '<td>' + escapeHtml(s.name) + '</td>';
                            salesHtml += '<td>' + escapeHtml(s.phone) + '</td>';
                            salesHtml += '<td>' + levelText + '</td>';
                            salesHtml += '<td>' + (s.parentId || '-') + '</td>';
                            salesHtml += '<td>' + (countMap.get(s.salesId) || 0) + '</td>';
                            salesHtml += '<td><button onclick="resetPassword(\'' + escapeHtml(s.salesId) + '\')">重置密码</button></td>';
                            salesHtml += '</tr>';
                        }
                        salesTbody.innerHTML = salesHtml;
                    }

                    var levelCount = {1:0,2:0,3:0};
                    for (var i = 0; i < sales.length; i++) {
                        levelCount[sales[i].level]++;
                    }
                    var totalCustomers = customers.length;
                    var statsHtml = '';
                    statsHtml += '<div class="stat-card"><div class="stat-number">' + sales.length + '</div><div>总销售员</div></div>';
                    statsHtml += '<div class="stat-card"><div class="stat-number">' + (levelCount[1] || 0) + '</div><div>一级销售员</div></div>';
                    statsHtml += '<div class="stat-card"><div class="stat-number">' + (levelCount[2] || 0) + '</div><div>二级销售员</div></div>';
                    statsHtml += '<div class="stat-card"><div class="stat-number">' + (levelCount[3] || 0) + '</div><div>三级销售员</div></div>';
                    statsHtml += '<div class="stat-card"><div class="stat-number">' + totalCustomers + '</div><div>总商家数</div></div>';
                    document.getElementById('stats').innerHTML = statsHtml;

                    var salesMap = new Map();
                    for (var i = 0; i < sales.length; i++) {
                        salesMap.set(sales[i].salesId, sales[i].name);
                    }
                    var customerRows = '';
                    for (var i = 0; i < customers.length; i++) {
                        var c = customers[i];
                        customerRows += '<tr>';
                        customerRows += '<td>' + escapeHtml(c.shopName) + '</td>';
                        customerRows += '<td>' + escapeHtml(c.address) + '</td>';
                        customerRows += '<td>' + escapeHtml(c.phone) + '</td>';
                        customerRows += '<td>' + escapeHtml(c.category) + '</td>';
                        customerRows += '<td>' + escapeHtml(c.remark || '') + '</td>';
                        customerRows += '<td>' + escapeHtml(salesMap.get(c.salesId) || c.salesId) + '</td>';
                        customerRows += '<td>' + new Date(c.createdAt).toLocaleString() + '</td>';
                        customerRows += '</tr>';
                    }
                    if (customerRows === '') {
                        customerRows = '<tr><td colspan="7">暂无商家数据</td></tr>';
                    }
                    document.getElementById('allCustomersList').innerHTML = customerRows;
                } catch (err) {
                    console.error(err);
                    showToast('加载数据失败，请刷新重试');
                }
            }

            async function addSalesman() {
                if (!isCloudReady) { showToast('系统未就绪，请稍后再试'); return; }
                var name = document.getElementById('newName').value.trim();
                var phone = document.getElementById('newPhone').value.trim();
                var password = document.getElementById('newPassword').value.trim();
                var level = parseInt(document.getElementById('newLevel').value);
                if (!name || !phone || !password) {
                    showToast('请填写姓名、手机号和密码');
                    return;
                }
                var exist = await db.collection('sales').where({ phone: phone }).get();
                if (exist.data.length > 0) {
                    showToast('该手机号已注册');
                    return;
                }
                var salesId = Date.now().toString();
                try {
                    await db.collection('sales').add({
                        salesId: salesId,
                        name: name,
                        phone: phone,
                        password: password,
                        level: level,
                        parentId: null,
                        createdAt: new Date().toISOString()
                    });
                    showToast('销售员添加成功');
                    document.getElementById('newName').value = '';
                    document.getElementById('newPhone').value = '';
                    document.getElementById('newPassword').value = '123456';
                    await loadData();
                } catch (err) {
                    console.error(err);
                    showToast('添加失败，请重试');
                }
            }

            window.resetPassword = async function(salesId) {
                if (!isCloudReady) { showToast('系统未就绪'); return; }
                var newPwd = prompt('请输入新密码（默认123456）', '123456');
                if (newPwd === null) return;
                try {
                    var res = await db.collection('sales').where({ salesId: salesId }).get();
                    if (res.data.length > 0) {
                        await db.collection('sales').doc(res.data[0]._id).update({ password: newPwd });
                        showToast('密码已重置');
                    }
                } catch (err) {
                    showToast('操作失败');
                }
            };

            window.exportCSV = function() {
                var table = document.getElementById('allCustomersList');
                var rows = table.querySelectorAll('tr');
                var csv = '店名,地址,电话,类目,备注,录入销售员,录入时间\n';
                for (var i = 0; i < rows.length; i++) {
                    var cells = rows[i].querySelectorAll('td');
                    if (cells.length) {
                        var rowData = [];
                        for (var j = 0; j < cells.length; j++) {
                            rowData.push('"' + cells[j].innerText + '"');
                        }
                        csv += rowData.join(',') + '\n';
                    }
                }
                var blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
                var link = document.createElement('a');
                var url = URL.createObjectURL(blob);
                link.href = url;
                link.setAttribute('download', '商家数据.csv');
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            };

            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                });
            }

            function logout() {
                localStorage.clear();
                window.location.href = 'index.html';
            }

            (async function() {
                await initCloud();
                if (!isCloudReady) return;
                var salesId = localStorage.getItem('salesId');
                if (salesId !== 'admin') {
                    alert('无权访问，请使用管理员账号登录');
                    return;
                }
                document.getElementById('mainContainer').style.display = 'block';
                await loadData();
            })();
        })();
    </script>
</body>
</html>
