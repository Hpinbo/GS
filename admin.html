<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>砚拓·管理员后台</title>
    <!-- 使用官方稳定版 SDK -->
    <script src="https://static.cloudbase.net/cloudbase-js-sdk/latest/cloudbase.full.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #f5f7fa; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        h2 { margin-bottom: 16px; color: #1e2a3a; font-size: 1.4rem; }
        .stats { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; }
        .stat-card { background: #f8f9fc; border-radius: 20px; padding: 16px; min-width: 150px; }
        .stat-number { font-size: 1.8rem; font-weight: bold; color: #2c3e50; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ecf0f1; }
        th { background: #f8f9fc; font-weight: 600; }
        button {
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        button:disabled { background: #95a5a6; cursor: not-allowed; }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 0.9rem;
            display: none;
            z-index: 2000;
        }
        .error-msg { color: #e74c3c; text-align: center; margin: 20px; }
        .loading { text-align: center; padding: 40px; color: #7f8c8d; }
    </style>
</head>
<body>
    <div class="container" id="mainContainer" style="display: none;">
        <div class="card">
            <h2>🔧 管理员控制台</h2>
            <div style="text-align: right;">
                <button onclick="logout()">退出登录</button>
            </div>
        </div>
        <div class="card">
            <h2>📊 整体统计</h2>
            <div id="stats" class="stats"></div>
        </div>
        <div class="card">
            <h2>👥 销售员列表</h2>
            <div style="overflow-x: auto;">
                <table id="salesTable">
                    <thead>
                        <tr><th>ID</th><th>姓名</th><th>手机号</th><th>级别</th><th>上级ID</th><th>录入商家数</th><th>操作</th></tr>
                    </thead>
                    <tbody id="salesList"><tr><td colspan="7" class="loading">加载中...</td></tr></tbody>
                </table>
            </div>
        </div>
        <div class="card">
            <h2>🏪 所有商家</h2>
            <div style="overflow-x: auto;">
                <table id="allCustomersTable">
                    <thead>
                        <tr><th>店名</th><th>地址</th><th>电话</th><th>类目</th><th>备注</th><th>录入销售员</th><th>录入时间</th></tr>
                    </thead>
                    <tbody id="allCustomersList"><tr><td colspan="7" class="loading">加载中...</td></tr></tbody>
                </table>
            </div>
            <button onclick="exportCSV()" style="margin-top: 16px;">📎 导出CSV</button>
        </div>
    </div>
    <div id="errorContainer" class="error-msg" style="display: none;"></div>
    <div id="toast" class="toast"></div>

    <script>
        const ENV_ID = 'good-reviews-3g35hh0i28b88e1b';
        let db = null;
        let initSuccess = false;

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        function showError(msg) {
            const errorDiv = document.getElementById('errorContainer');
            errorDiv.innerText = msg;
            errorDiv.style.display = 'block';
            document.getElementById('mainContainer').style.display = 'none';
        }

        // 初始化云开发
        async function initCloud() {
            if (typeof cloudbase === 'undefined') {
                showError('SDK 加载失败，请刷新页面重试');
                return false;
            }
            try {
                const app = cloudbase.init({ env: ENV_ID });
                db = app.database();
                // 测试连接
                await db.collection('sales').limit(1).get();
                initSuccess = true;
                return true;
            } catch (err) {
                console.error('初始化失败', err);
                let errorMsg = '数据库初始化失败：';
                if (err.message && err.message.includes('env')) errorMsg += '环境ID错误，请检查';
                else if (err.message && err.message.includes('permission')) errorMsg += '权限不足，请检查安全域名或数据库权限';
                else errorMsg += err.message || '未知错误';
                showError(errorMsg);
                return false;
            }
        }

        // 加载数据
        async function loadData() {
            if (!db) return;
            try {
                // 获取所有销售员（排除管理员）
                const salesRes = await db.collection('sales').get();
                const sales = salesRes.data.filter(s => s.salesId !== 'admin');
                // 获取所有商家
                const customersRes = await db.collection('customers').get();
                const customers = customersRes.data;

                // 统计每个销售员的商家数
                const countMap = new Map();
                customers.forEach(c => countMap.set(c.salesId, (countMap.get(c.salesId) || 0) + 1));

                // 渲染销售员表格
                const salesTbody = document.getElementById('salesList');
                if (sales.length === 0) {
                    salesTbody.innerHTML = '<tr><td colspan="7">暂无销售员数据</td></tr>';
                } else {
                    salesTbody.innerHTML = sales.map(s => `
                        <tr>
                            <td>${s.salesId}</td>
                            <td>${s.name}</td>
                            <td>${s.phone}</td>
                            <td>${s.level === 1 ? '一级（市）' : s.level === 2 ? '二级（区县）' : '三级（街道）'}</td>
                            <td>${s.parentId || '-'}</td>
                            <td>${countMap.get(s.salesId) || 0}</td>
                            <td><button onclick="resetPassword('${s.salesId}')">重置密码</button></td>
                        </tr>
                    `).join('');
                }

                // 整体统计
                const levelCount = {1:0,2:0,3:0};
                sales.forEach(s => levelCount[s.level]++);
                const totalCustomers = customers.length;
                const statsHtml = `
                    <div class="stat-card"><div class="stat-number">${sales.length}</div><div>总销售员</div></div>
                    <div class="stat-card"><div class="stat-number">${levelCount[1] || 0}</div><div>一级销售员</div></div>
                    <div class="stat-card"><div class="stat-number">${levelCount[2] || 0}</div><div>二级销售员</div></div>
                    <div class="stat-card"><div class="stat-number">${levelCount[3] || 0}</div><div>三级销售员</div></div>
                    <div class="stat-card"><div class="stat-number">${totalCustomers}</div><div>总商家数</div></div>
                `;
                document.getElementById('stats').innerHTML = statsHtml;

                // 渲染商家表格
                const salesMap = new Map();
                sales.forEach(s => salesMap.set(s.salesId, s.name));
                const customerRows = customers.map(c => `
                    <tr>
                        <td>${c.shopName}</td>
                        <td>${c.address}</td>
                        <td>${c.phone}</td>
                        <td>${c.category}</td>
                        <td>${c.remark || ''}</td>
                        <td>${salesMap.get(c.salesId) || c.salesId}</td>
                        <td>${new Date(c.createdAt).toLocaleString()}</td>
                    </tr>
                `).join('');
                document.getElementById('allCustomersList').innerHTML = customerRows || '<tr><td colspan="7">暂无商家数据</td></tr>';
            } catch (err) {
                console.error(err);
                showToast('加载数据失败，请刷新重试');
            }
        }

        // 重置密码
        async function resetPassword(salesId) {
            const newPwd = prompt('请输入新密码（默认123456）', '123456');
            if (newPwd === null) return;
            try {
                const res = await db.collection('sales').where({ salesId }).get();
                if (res.data.length > 0) {
                    await db.collection('sales').doc(res.data[0]._id).update({ password: newPwd });
                    showToast('密码已重置');
                }
            } catch (err) {
                console.error(err);
                showToast('操作失败');
            }
        }

        // 导出CSV
        function exportCSV() {
            const table = document.getElementById('allCustomersList');
            const rows = table.querySelectorAll('tr');
            let csv = '店名,地址,电话,类目,备注,录入销售员,录入时间\n';
            rows.forEach(row => {
                const cells = row.querySelectorAll('td');
                if (cells.length) {
                    const rowData = Array.from(cells).map(cell => `"${cell.innerText}"`).join(',');
                    csv += rowData + '\n';
                }
            });
            const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.href = url;
            link.setAttribute('download', '商家数据.csv');
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        // 页面启动
        (async () => {
            const ok = await initCloud();
            if (!ok) return;
            // 验证登录身份
            const salesId = localStorage.getItem('salesId');
            if (salesId !== 'admin') {
                showError('无权访问，请使用管理员账号登录');
                return;
            }
            document.getElementById('mainContainer').style.display = 'block';
            await loadData();
        })();
    </script>
</body>
</html>
