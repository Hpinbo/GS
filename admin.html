<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>砚拓·管理员后台</title>
    <link rel="preconnect" href="https://static.cloudbase.net">
    <script src="https://static.cloudbase.net/cloudbase-js-sdk/latest/cloudbase.full.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background: #f5f7fa;
            padding: 16px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        h2 {
            font-size: 1.5rem;
            margin-bottom: 16px;
            color: #1e2a3a;
        }
        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #f8f9fc;
            border-radius: 20px;
            padding: 12px 16px;
            flex: 1;
            min-width: 100px;
            text-align: center;
        }
        .stat-number {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2c3e50;
        }
        .stat-label {
            font-size: 0.75rem;
            color: #5a6e7c;
        }
        .form-group {
            margin-bottom: 12px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #dce3ec;
            border-radius: 24px;
            font-size: 0.9rem;
        }
        .add-salesman {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: flex-end;
        }
        .add-salesman .form-group {
            flex: 1;
            min-width: 120px;
            margin-bottom: 0;
        }
        .add-salesman button {
            width: auto;
            margin-top: 0;
            padding: 10px 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        th, td {
            padding: 12px 8px;
            text-align: left;
            border-bottom: 1px solid #ecf0f1;
        }
        th {
            background: #f8f9fc;
            font-weight: 600;
        }
        button {
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 0.9rem;
            display: none;
            z-index: 2000;
            white-space: nowrap;
        }
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
        }
        .header-bar h2 {
            margin-bottom: 0;
        }
        .table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        @media (max-width: 768px) {
            body {
                padding: 12px;
            }
            .card {
                padding: 18px;
            }
            h2 {
                font-size: 1.3rem;
            }
            button {
                padding: 10px 16px;
                font-size: 0.9rem;
            }
            th, td {
                padding: 8px 6px;
                font-size: 0.8rem;
            }
            .toast {
                white-space: normal;
                max-width: 90%;
                text-align: center;
            }
        }
        @media (max-width: 600px) {
            .add-salesman {
                flex-direction: column;
            }
            .add-salesman .form-group {
                width: 100%;
            }
            .add-salesman button {
                width: 100%;
                margin-top: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="mainContainer" style="display: none;">
        <div class="card">
            <div class="header-bar">
                <h2>🔧 管理员控制台</h2>
                <button onclick="window.logout()">退出登录</button>
            </div>
        </div>

        <div class="card">
            <h2>➕ 添加销售员</h2>
            <div class="add-salesman">
                <div class="form-group"><input type="text" id="newName" placeholder="姓名"></div>
                <div class="form-group"><input type="tel" id="newPhone" placeholder="手机号"></div>
                <div class="form-group"><input type="text" id="newPassword" placeholder="密码" value="123456"></div>
                <div class="form-group">
                    <select id="newLevel">
                        <option value="1">一级销售员（市）</option>
                        <option value="2">二级销售员（区县）</option>
                        <option value="3">三级销售员（街道）</option>
                    </select>
                </div>
                <button onclick="window.addSalesman()">添加销售员</button>
            </div>
        </div>

        <div class="card">
            <h2>📊 整体统计</h2>
            <div id="stats" class="stats"></div>
        </div>

        <div class="card">
            <h2>👥 销售员列表</h2>
            <div class="table-wrapper">
                <table id="salesTable">
                    <thead>
                        <tr><th>姓名</th><th>手机号</th><th>级别</th><th>录入商家数</th><th>操作</th>……
                    </thead>
                    <tbody id="salesList"></tbody>
                ……
            </div>
        </div>

        <div class="card">
            <h2>🏪 所有商家</h2>
            <div class="table-wrapper">
                <table id="allCustomersTable">
                    <thead>
                        <tr><th>店名</th><th>地址</th><th>电话</th><th>类目</th><th>录入销售员</th><th>录入时间</th>……
                    </thead>
                    <tbody id="allCustomersList"></tbody>
                ……
            </div>
            <button onclick="window.exportCSV()" style="margin-top: 16px;">📎 导出CSV</button>
        </div>
    </div>
    <div id="toast" class="toast"></div>

    <script>
        (function() {
            var CLOUD_ENV = 'good-reviews-3g35hh0i28b88e1b';
            var db = null;
            var isCloudReady = false;

            function showToast(msg) {
                var toast = document.getElementById('toast');
                toast.textContent = msg;
                toast.style.display = 'block';
                setTimeout(function() { toast.style.display = 'none'; }, 2000);
            }

            async function initCloud() {
                var wait = 0;
                while (typeof cloudbase === 'undefined' && wait < 30) {
                    await new Promise(function(r) { setTimeout(r, 200); });
                    wait++;
                }
                if (typeof cloudbase === 'undefined') {
                    alert('SDK 加载失败，请刷新页面重试');
                    return false;
                }
                try {
                    var app = cloudbase.init({ env: CLOUD_ENV, region: 'ap-shanghai' });
                    db = app.database();
                    await db.collection('sales').limit(1).get();
                    isCloudReady = true;
                    return true;
                } catch (err) {
                    console.error(err);
                    alert('初始化失败：' + (err.message || '请检查环境ID或安全域名'));
                    return false;
                }
            }

            async function loadData() {
                if (!db) return;
                try {
                    var salesRes = await db.collection('sales').get();
                    var sales = salesRes.data.filter(function(s) { return s.salesId !== 'admin'; });
                    var customersRes = await db.collection('customers').get();
                    var customers = customersRes.data;

                    var countMap = new Map();
                    customers.forEach(function(c) { countMap.set(c.salesId, (countMap.get(c.salesId) || 0) + 1); });

                    var salesTbody = document.getElementById('salesList');
                    if (sales.length === 0) {
                        salesTbody.innerHTML = '……
                    } else {
                        var rows = [];
                        for (var i = 0; i < sales.length; i++) {
                            var s = sales[i];
                            var levelText = s.level === 1 ? '一级' : (s.level === 2 ? '二级' : '三级');
                            rows.push('……
                            rows.push('……
                            rows.push('……
                            rows.push('……
                            rows.push('……
                            rows.push('……
                            rows.push('……
                        }
                        salesTbody.innerHTML = rows.join('');
                    }

                    var levelCount = {1:0,2:0,3:0};
                    for (var i = 0; i < sales.length; i++) levelCount[sales[i].level]++;
                    var statsHtml = '';
                    statsHtml += '<div class="stat-card"><div class="stat-number">' + sales.length + '</div><div class="stat-label">总销售员</div></div>';
                    statsHtml += '<div class="stat-card"><div class="stat-number">' + (levelCount[1] || 0) + '</div><div class="stat-label">一级</div></div>';
                    statsHtml += '<div class="stat-card"><div class="stat-number">' + (levelCount[2] || 0) + '</div><div class="stat-label">二级</div></div>';
                    statsHtml += '<div class="stat-card"><div class="stat-number">' + (levelCount[3] || 0) + '</div><div class="stat-label">三级</div></div>';
                    statsHtml += '<div class="stat-card"><div class="stat-number">' + customers.length + '</div><div class="stat-label">总商家数</div></div>';
                    document.getElementById('stats').innerHTML = statsHtml;

                    var salesMap = new Map();
                    for (var i = 0; i < sales.length; i++) salesMap.set(sales[i].salesId, sales[i].name);
                    var customerRows = [];
                    for (var i = 0; i < customers.length; i++) {
                        var c = customers[i];
                        customerRows.push('……
                        customerRows.push('……
                        customerRows.push('……
                        customerRows.push('……
                        customerRows.push('……
                        customerRows.push('……
                        customerRows.push('……
                    }
                    if (customerRows.length === 0) customerRows.push('……
                    document.getElementById('allCustomersList').innerHTML = customerRows.join('');
                } catch (err) {
                    console.error(err);
                    showToast('加载数据失败');
                }
            }

            async function addSalesman() {
                if (!isCloudReady) { showToast('系统未就绪'); return; }
                var name = document.getElementById('newName').value.trim();
                var phone = document.getElementById('newPhone').value.trim();
                var password = document.getElementById('newPassword').value.trim();
                var level = parseInt(document.getElementById('newLevel').value);
                if (!name || !phone || !password) { showToast('请填写完整信息'); return; }
                var exist = await db.collection('sales').where({ phone: phone }).get();
                if (exist.data.length > 0) { showToast('该手机号已注册'); return; }
                var salesId = Date.now().toString();
                try {
                    await db.collection('sales').add({
                        salesId: salesId,
                        name: name,
                        phone: phone,
                        password: password,
                        level: level,
                        parentId: null,
                        createdAt: new Date().toISOString()
                    });
                    showToast('✅ 销售员添加成功');
                    document.getElementById('newName').value = '';
                    document.getElementById('newPhone').value = '';
                    document.getElementById('newPassword').value = '123456';
                    await loadData();
                } catch (err) { showToast('添加失败'); }
            }

            async function resetPassword(salesId) {
                var newPwd = prompt('请输入新密码', '123456');
                if (!newPwd) return;
                var res = await db.collection('sales').where({ salesId: salesId }).get();
                if (res.data.length) await db.collection('sales').doc(res.data[0]._id).update({ password: newPwd });
                showToast('密码已重置');
            }

            function exportCSV() {
                var table = document.getElementById('allCustomersList');
                var rows = table.querySelectorAll('tr');
                var csv = '店名,地址,电话,类目,备注,录入销售员,录入时间\n';
                for (var i = 0; i < rows.length; i++) {
                    var cells = rows[i].querySelectorAll('td');
                    if (cells.length) {
                        var rowData = [];
                        for (var j = 0; j < cells.length; j++) rowData.push('"' + cells[j].innerText + '"');
                        csv += rowData.join(',') + '\n';
                    }
                }
                var blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
                var link = document.createElement('a');
                var url = URL.createObjectURL(blob);
                link.href = url;
                link.download = '商家数据.csv';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            }

            function logout() {
                localStorage.clear();
                window.location.href = 'index.html';
            }

            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                });
            }

            window.addSalesman = addSalesman;
            window.logout = logout;
            window.resetPassword = resetPassword;
            window.exportCSV = exportCSV;

            (async function() {
                if (!await initCloud()) return;
                if (localStorage.getItem('salesId') !== 'admin') {
                    alert('无权访问，请使用管理员账号登录');
                    return;
                }
                document.getElementById('mainContainer').style.display = 'block';
                await loadData();
            })();
        })();
    </script>
</body>
</html>
