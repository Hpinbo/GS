<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>商家信息填写</title>
    <link rel="preconnect" href="https://static.cloudbase.net">
    <script src="https://static.cloudbase.net/cloudbase-js-sdk/latest/cloudbase.full.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body {
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 32px;
            padding: 28px 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }
        h2 { margin-bottom: 16px; color: #1e2a3a; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; font-weight: 500; color: #2c3e50; }
        input, select, textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #dce3ec;
            border-radius: 20px;
            font-size: 0.95rem;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 0.9rem;
            display: none;
            z-index: 2000;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>📝 商家信息填写</h2>
        <p>请填写您的店铺信息，我们将尽快为您服务。</p>
        <form id="customerForm">
            <div class="form-group">
                <label>店名 *</label>
                <input type="text" id="shopName" required>
            </div>
            <div class="form-group">
                <label>地址 *</label>
                <input type="text" id="address" required>
            </div>
            <div class="form-group">
                <label>联系电话 *</label>
                <input type="tel" id="phone" required>
            </div>
            <div class="form-group">
                <label>类目 *</label>
                <select id="category" required>
                    <option value="">请选择</option>
                    <option value="网咖">网咖</option>
                    <option value="餐饮">餐饮</option>
                    <option value="维修">维修</option>
                    <option value="休闲娱乐">休闲娱乐</option>
                    <option value="其他">其他</option>
                </select>
                <div id="customCategoryGroup" style="display:none; margin-top:10px;">
                    <input type="text" id="customCategory" placeholder="请输入具体类目">
                </div>
            </div>
            <div class="form-group">
                <label>备注</label>
                <textarea id="remark" rows="2"></textarea>
            </div>
            <button type="submit">提交信息</button>
        </form>
    </div>
    <div id="toast" class="toast"></div>

    <script>
        (function() {
            var CLOUD_ENV = 'good-reviews-3g35hh0i28b88e1b';
            var db = null;
            var isCloudReady = false;
            var urlParams = new URLSearchParams(window.location.search);
            var salesId = urlParams.get('salesId');
            if (!salesId) {
                alert('无效链接，请联系销售员');
                throw new Error('缺少销售员ID');
            }

            function showToast(msg) {
                var toast = document.getElementById('toast');
                toast.textContent = msg;
                toast.style.display = 'block';
                setTimeout(function() {
                    toast.style.display = 'none';
                }, 3000);
            }

            async function initCloud() {
                try {
                    var app = cloudbase.init({ env: CLOUD_ENV });
                    await app.auth().signInAnonymously();
                    db = app.database();
                    isCloudReady = true;
                    console.log('云数据库初始化成功');
                } catch (err) {
                    console.error('云数据库初始化失败', err);
                    alert('初始化失败：' + (err.message || '请检查环境ID或匿名登录是否开启'));
                    isCloudReady = false;
                }
            }

            var categorySelect = document.getElementById('category');
            var customGroup = document.getElementById('customCategoryGroup');
            var customInput = document.getElementById('customCategory');
            categorySelect.addEventListener('change', function() {
                if (categorySelect.value === '其他') {
                    customGroup.style.display = 'block';
                    customInput.required = true;
                } else {
                    customGroup.style.display = 'none';
                    customInput.required = false;
                    customInput.value = '';
                }
            });

            document.getElementById('customerForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                if (!isCloudReady) { showToast('系统未就绪，请稍后再试'); return; }
                var shopName = document.getElementById('shopName').value.trim();
                var address = document.getElementById('address').value.trim();
                var phone = document.getElementById('phone').value.trim();
                var category = categorySelect.value;
                if (category === '其他') {
                    var custom = customInput.value.trim();
                    if (!custom) { showToast('请填写具体类目'); return; }
                    category = custom;
                }
                var remark = document.getElementById('remark').value.trim();
                if (!shopName || !address || !phone) {
                    showToast('请填写所有带 * 的字段');
                    return;
                }
                try {
                    await db.collection('customers').add({
                        shopName: shopName,
                        address: address,
                        phone: phone,
                        category: category,
                        remark: remark,
                        salesId: salesId,
                        createdAt: new Date().toISOString()
                    });
                    showToast('✅ 提交成功！感谢您的信任');
                    document.getElementById('customerForm').reset();
                    categorySelect.value = '';
                    customGroup.style.display = 'none';
                } catch (err) {
                    console.error(err);
                    showToast('提交失败，请重试');
                }
            });

            initCloud();
        })();
    </script>
</body>
</html>
