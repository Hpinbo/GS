<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>销售系统登录</title>
    <script src="https://static.cloudbase.net/cloudbase-js-sdk/latest/cloudbase.full.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body {
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 32px;
            padding: 32px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }
        h2 { margin-bottom: 24px; text-align: center; color: #1e2a3a; }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #dce3ec;
            border-radius: 40px;
            margin-bottom: 16px;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        button:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }
        .error { color: #e74c3c; text-align: center; margin-top: 12px; font-size: 0.9rem; }
        .info { color: #f39c12; text-align: center; margin-top: 12px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>销售系统登录</h2>
        <input type="text" id="phone" placeholder="手机号" autocomplete="off">
        <input type="password" id="password" placeholder="密码">
        <button id="loginBtn" onclick="login()">登录</button>
        <div id="errorMsg" class="error"></div>
        <div id="infoMsg" class="info"></div>
    </div>

    <script>
        const ENV_ID = 'good-reviews-3g35hh0i28b88e1b';
        let db = null;
        let initSuccess = false;

        function showInfo(msg) {
            const infoDiv = document.getElementById('infoMsg');
            infoDiv.innerText = msg;
            setTimeout(() => { infoDiv.innerText = ''; }, 3000);
        }

        function setLoginButton(disabled, text) {
            const btn = document.getElementById('loginBtn');
            btn.disabled = disabled;
            if (text) btn.innerText = text;
            else btn.innerText = '登录';
        }

        async function initCloud() {
            if (typeof cloudbase === 'undefined') {
                document.getElementById('errorMsg').innerText = 'SDK 加载失败，请刷新页面重试';
                setLoginButton(true, '初始化失败');
                return false;
            }
            try {
                const app = cloudbase.init({ env: ENV_ID });
                db = app.database();
                // 测试连接
                await db.collection('sales').limit(1).get();
                initSuccess = true;
                setLoginButton(false);
                showInfo('✅ 系统已就绪，可以登录');
                return true;
            } catch (err) {
                console.error('初始化失败', err);
                let errorMsg = '数据库初始化失败：';
                if (err.message && err.message.includes('env')) errorMsg += '环境ID错误，请检查';
                else if (err.message && err.message.includes('permission')) errorMsg += '权限不足，请检查安全域名或数据库权限';
                else errorMsg += err.message || '未知错误';
                document.getElementById('errorMsg').innerText = errorMsg;
                setLoginButton(true, '初始化失败');
                return false;
            }
        }

        async function login() {
            if (!initSuccess) {
                document.getElementById('errorMsg').innerText = '系统未就绪，请稍后再试或刷新页面';
                return;
            }
            const phone = document.getElementById('phone').value.trim();
            const pwd = document.getElementById('password').value.trim();
            if (!phone || !pwd) {
                document.getElementById('errorMsg').innerText = '请输入手机号和密码';
                return;
            }
            setLoginButton(true, '登录中...');
            try {
                const res = await db.collection('sales').where({ phone: phone, password: pwd }).get();
                if (res.data.length > 0) {
                    const sales = res.data[0];
                    localStorage.setItem('salesId', sales.salesId);
                    localStorage.setItem('salesName', sales.name);
                    localStorage.setItem('salesLevel', sales.level);
                    if (sales.salesId === 'admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'salesman.html';
                    }
                } else {
                    document.getElementById('errorMsg').innerText = '账号或密码错误';
                    setLoginButton(false);
                }
            } catch (err) {
                console.error(err);
                document.getElementById('errorMsg').innerText = '登录失败，请检查网络或数据库权限';
                setLoginButton(false);
            }
        }

        window.addEventListener('load', initCloud);
    </script>
</body>
</html>
