<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>砚拓·销售系统登录</title>
    <!-- 使用与好评网站相同的稳定旧版 SDK 1.14.0 -->
    <script src="https://cdn.jsdelivr.net/npm/@cloudbase/js-sdk@1.14.0/lib/cloudbase.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body {
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 32px;
            padding: 32px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }
        h2 { margin-bottom: 24px; text-align: center; color: #1e2a3a; }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #dce3ec;
            border-radius: 40px;
            margin-bottom: 16px;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        button:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }
        .error { color: #e74c3c; text-align: center; margin-top: 12px; font-size: 0.9rem; }
        .info { color: #f39c12; text-align: center; margin-top: 12px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>销售系统登录</h2>
        <input type="text" id="phone" placeholder="手机号" autocomplete="off">
        <input type="password" id="password" placeholder="密码">
        <button id="loginBtn" onclick="login()">登录</button>
        <div id="errorMsg" class="error"></div>
        <div id="infoMsg" class="info"></div>
    </div>

    <script>
        const ENV_ID = 'good-reviews-3g35hh0i28b88e1b';
        let db = null;
        let isReady = false;

        function showInfo(msg) {
            const infoDiv = document.getElementById('infoMsg');
            infoDiv.innerText = msg;
            setTimeout(() => { if (infoDiv.innerText === msg) infoDiv.innerText = ''; }, 3000);
        }

        function showError(msg) {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.innerText = msg;
        }

        function setButtonEnabled(enabled) {
            const btn = document.getElementById('loginBtn');
            btn.disabled = !enabled;
            btn.innerText = enabled ? '登录' : '初始化中...';
        }

        async function init() {
            setButtonEnabled(false);
            // 等待 SDK 加载（与好评网站相同方式）
            if (typeof cloudbase === 'undefined') {
                await new Promise(resolve => {
                    let count = 0;
                    const check = setInterval(() => {
                        if (typeof cloudbase !== 'undefined' || count > 100) {
                            clearInterval(check);
                            resolve();
                        }
                        count++;
                    }, 100);
                });
            }
            if (typeof cloudbase === 'undefined') {
                showError('SDK 加载失败，请刷新页面重试');
                return;
            }
            try {
                const app = cloudbase.init({ env: ENV_ID });
                db = app.database();
                // 测试连接（与好评网站完全相同）
                const testRes = await db.collection('sales').limit(1).get();
                isReady = true;
                setButtonEnabled(true);
                showInfo('✅ 系统已就绪，可以登录');
                console.log('测试查询结果:', testRes);
            } catch (err) {
                console.error('初始化错误:', err);
                showError('初始化失败：' + (err.message || '请检查安全域名和数据库权限'));
                setButtonEnabled(false);
            }
        }

        async function login() {
            if (!isReady) {
                showError('系统未就绪，请稍后再试');
                return;
            }
            const phone = document.getElementById('phone').value.trim();
            const pwd = document.getElementById('password').value.trim();
            if (!phone || !pwd) {
                showError('请输入手机号和密码');
                return;
            }
            setButtonEnabled(false);
            try {
                const res = await db.collection('sales').where({ phone: phone, password: pwd }).get();
                if (res.data.length > 0) {
                    const sales = res.data[0];
                    localStorage.setItem('salesId', sales.salesId);
                    localStorage.setItem('salesName', sales.name);
                    localStorage.setItem('salesLevel', sales.level);
                    if (sales.salesId === 'admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'salesman.html';
                    }
                } else {
                    showError('账号或密码错误');
                    setButtonEnabled(true);
                }
            } catch (err) {
                console.error(err);
                showError('登录失败，请检查网络');
                setButtonEnabled(true);
            }
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
