<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>砚拓·销售系统登录</title>
    <link rel="preconnect" href="https://static.cloudbase.net">
    <script src="https://static.cloudbase.net/cloudbase-js-sdk/latest/cloudbase.full.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #f5f7fa; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: white; border-radius: 32px; padding: 32px 24px; width: 100%; max-width: 360px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
        h2 { font-size: 1.8rem; margin-bottom: 8px; text-align: center; color: #1e2a3a; }
        .sub { text-align: center; color: #5a6e7c; margin-bottom: 28px; font-size: 0.9rem; }
        input { width: 100%; padding: 14px 16px; border: 1px solid #dce3ec; border-radius: 40px; margin-bottom: 16px; font-size: 1rem; background: #fff; }
        input:focus { outline: none; border-color: #4f9eff; box-shadow: 0 0 0 3px rgba(79,158,255,0.1); }
        button { width: 100%; padding: 14px; background: #2c3e50; color: white; border: none; border-radius: 40px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.98); background: #1e2a3a; }
        button:disabled { background: #95a5a6; cursor: not-allowed; transform: none; }
        .error { color: #e74c3c; text-align: center; margin-top: 16px; font-size: 0.85rem; }
        .info { color: #f39c12; text-align: center; margin-top: 12px; font-size: 0.85rem; }
        @media (max-width: 480px) { .login-card { padding: 24px 20px; } h2 { font-size: 1.5rem; } input, button { padding: 12px; } }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>砚拓·销售系统</h2>
        <div class="sub">销售员/管理员登录</div>
        <input type="text" id="phone" placeholder="手机号" autocomplete="off">
        <input type="password" id="password" placeholder="密码" autocomplete="off">
        <button id="loginBtn">登录</button>
        <div id="errorMsg" class="error"></div>
        <div id="infoMsg" class="info"></div>
    </div>

    <script>
        (function() {
            var CLOUD_ENV = 'good-reviews-3g35hh0i28b88e1b';
            var db = null;
            var initSuccess = false;

            var phoneInput = document.getElementById('phone');
            var pwdInput = document.getElementById('password');
            var loginBtn = document.getElementById('loginBtn');
            var errorMsg = document.getElementById('errorMsg');
            var infoMsg = document.getElementById('infoMsg');

            function showInfo(msg) {
                infoMsg.innerText = msg;
                setTimeout(function() { if (infoMsg.innerText === msg) infoMsg.innerText = ''; }, 3000);
            }

            function showError(msg) {
                errorMsg.innerText = msg;
            }

            function setButtonEnabled(enabled) {
                loginBtn.disabled = !enabled;
                loginBtn.innerText = enabled ? '登录' : '初始化中...';
            }

            async function initCloud() {
                // 等待 SDK 加载
                var waitCount = 0;
                while (typeof cloudbase === 'undefined' && waitCount < 30) {
                    await new Promise(function(r) { setTimeout(r, 200); });
                    waitCount++;
                }
                if (typeof cloudbase === 'undefined') {
                    showError('SDK 加载失败，请刷新页面重试');
                    setButtonEnabled(false);
                    return;
                }
                try {
                    var app = cloudbase.init({ env: CLOUD_ENV, region: 'ap-shanghai' });
                    db = app.database();
                    await db.collection('sales').limit(1).get();
                    initSuccess = true;
                    setButtonEnabled(true);
                    showInfo('✅ 系统已就绪');
                } catch (err) {
                    console.error(err);
                    var msg = err.message || '';
                    if (msg.includes('scope')) {
                        msg = '请检查安全域名配置：hpinbo.github.io';
                    } else {
                        msg = '初始化失败：' + msg;
                    }
                    showError(msg);
                    setButtonEnabled(false);
                }
            }

            async function login() {
                if (!initSuccess) {
                    showError('系统未就绪，请稍后再试');
                    return;
                }
                var phone = phoneInput.value.trim();
                var pwd = pwdInput.value.trim();
                if (!phone || !pwd) {
                    showError('请输入手机号和密码');
                    return;
                }
                setButtonEnabled(false);
                loginBtn.innerText = '登录中...';
                try {
                    var res = await db.collection('sales').where({ phone: phone, password: pwd }).get();
                    if (res.data.length > 0) {
                        var sales = res.data[0];
                        localStorage.setItem('salesId', sales.salesId);
                        localStorage.setItem('salesName', sales.name);
                        localStorage.setItem('salesLevel', sales.level);
                        if (sales.salesId === 'admin') {
                            window.location.href = 'admin.html';
                        } else {
                            window.location.href = 'salesman.html';
                        }
                    } else {
                        showError('账号或密码错误');
                        setButtonEnabled(true);
                    }
                } catch (err) {
                    console.error(err);
                    showError('登录失败，请检查网络');
                    setButtonEnabled(true);
                }
            }

            function onEnter(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    login();
                }
            }
            phoneInput.addEventListener('keypress', onEnter);
            pwdInput.addEventListener('keypress', onEnter);
            loginBtn.addEventListener('click', login);

            window.addEventListener('load', initCloud);
        })();
    </script>
</body>
</html>
