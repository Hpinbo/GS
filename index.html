<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>砚拓·销售系统登录</title>
    <script src="https://static.cloudbase.net/cloudbase-js-sdk/latest/cloudbase.full.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body {
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 32px;
            padding: 32px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }
        h2 { margin-bottom: 24px; text-align: center; color: #1e2a3a; }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #dce3ec;
            border-radius: 40px;
            margin-bottom: 16px;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        button:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }
        .error { color: #e74c3c; text-align: center; margin-top: 12px; font-size: 0.9rem; }
        .info { color: #f39c12; text-align: center; margin-top: 12px; font-size: 0.9rem; }
        .debug {
            background: #f0f0f0;
            padding: 10px;
            margin-top: 16px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-family: monospace;
            word-break: break-all;
            text-align: left;
            max-height: 300px;
            overflow-y: auto;
        }
        .suggestion {
            background: #fff3e0;
            border-left: 4px solid #f39c12;
            padding: 10px;
            margin-top: 16px;
            font-size: 0.8rem;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>销售系统登录</h2>
        <input type="text" id="phone" placeholder="手机号" autocomplete="off">
        <input type="password" id="password" placeholder="密码">
        <button id="loginBtn" onclick="login()">登录</button>
        <div id="errorMsg" class="error"></div>
        <div id="infoMsg" class="info"></div>
        <div id="debugInfo" class="debug"></div>
        <div id="suggestion" class="suggestion" style="display:none;"></div>
    </div>

    <script>
        const ENV_ID = 'good-reviews-3g35hh0i28b88e1b';
        let db = null;
        let isReady = false;

        function showDebug(msg) {
            const debugDiv = document.getElementById('debugInfo');
            debugDiv.innerHTML += new Date().toLocaleTimeString() + ': ' + msg + '<br>';
            console.log(msg);
        }

        function showInfo(msg) {
            const infoDiv = document.getElementById('infoMsg');
            infoDiv.innerText = msg;
            setTimeout(() => { if (infoDiv.innerText === msg) infoDiv.innerText = ''; }, 3000);
        }

        function showError(msg) {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.innerText = msg;
        }

        function showSuggestion(msg) {
            const suggestionDiv = document.getElementById('suggestion');
            suggestionDiv.innerHTML = msg;
            suggestionDiv.style.display = 'block';
        }

        function setButtonEnabled(enabled) {
            const btn = document.getElementById('loginBtn');
            btn.disabled = !enabled;
            btn.innerText = enabled ? '登录' : '初始化中...';
        }

        async function initCloud() {
            setButtonEnabled(false);
            showDebug('=== 开始初始化云开发 ===');
            showDebug('环境ID: ' + ENV_ID);
            
            // 等待 SDK 加载
            let waitCount = 0;
            while (typeof cloudbase === 'undefined' && waitCount < 50) {
                await new Promise(r => setTimeout(r, 200));
                waitCount++;
            }
            
            if (typeof cloudbase === 'undefined') {
                showDebug('❌ SDK 加载超时');
                showError('SDK 加载失败，请刷新页面重试');
                setButtonEnabled(false);
                return false;
            }
            
            showDebug('✅ SDK 已加载，版本: ' + (cloudbase.version || '未知'));
            
            try {
                showDebug('调用 cloudbase.init()...');
                const app = cloudbase.init({ 
                    env: ENV_ID,
                    // 添加超时配置
                    timeout: 30000
                });
                showDebug('✅ init 成功');
                
                showDebug('获取数据库实例...');
                db = app.database();
                showDebug('✅ 数据库实例创建成功');
                
                // 尝试不同的查询方式，绕过可能的 SDK bug
                showDebug('尝试查询 sales 集合（方式1：直接 get）...');
                try {
                    const testResult = await db.collection('sales').get();
                    showDebug('✅ 查询成功！返回 ' + testResult.data.length + ' 条数据');
                    
                    if (testResult.data.length === 0) {
                        showDebug('⚠️ sales 集合为空，请先添加管理员记录');
                        showSuggestion('⚠️ 数据库为空，请先添加管理员记录到 sales 集合');
                    } else {
                        showDebug('数据示例: ' + JSON.stringify(testResult.data[0]).substring(0, 100));
                    }
                    
                    isReady = true;
                    setButtonEnabled(true);
                    showInfo('✅ 系统已就绪，可以登录');
                    showDebug('=== 初始化完成 ===');
                    return true;
                } catch (err) {
                    // 如果第一种方式失败，尝试更简单的查询
                    showDebug('方式1失败: ' + err.message);
                    showDebug('尝试查询 sales 集合（方式2：使用 where 空条件）...');
                    try {
                        const testResult = await db.collection('sales').where({}).limit(1).get();
                        showDebug('✅ 方式2查询成功！返回 ' + testResult.data.length + ' 条数据');
                        isReady = true;
                        setButtonEnabled(true);
                        showInfo('✅ 系统已就绪，可以登录');
                        return true;
                    } catch (err2) {
                        throw err2;
                    }
                }
            } catch (err) {
                showDebug('❌ 初始化失败: ' + (err.message || JSON.stringify(err)));
                console.error('初始化错误详情:', err);
                
                // 生成详细的错误建议
                let suggestionHtml = '<strong>🔧 请按以下步骤检查：</strong><br><br>';
                suggestionHtml += '1️⃣ <strong>安全域名配置</strong><br>';
                suggestionHtml += '   在云开发控制台 → 安全配置 → 安全域名中，添加：<code>https://hpinbo.github.io</code><br><br>';
                suggestionHtml += '2️⃣ <strong>数据库集合</strong><br>';
                suggestionHtml += '   确认存在集合 <code>sales</code>，如不存在请新建<br><br>';
                suggestionHtml += '3️⃣ <strong>数据库权限</strong><br>';
                suggestionHtml += '   在 <code>sales</code> 集合的权限设置中，选择「自定义规则」，输入：<br>';
                suggestionHtml += '   <code>{ "read": true, "write": true }</code><br><br>';
                suggestionHtml += '4️⃣ <strong>添加管理员记录</strong><br>';
                suggestionHtml += '   在 <code>sales</code> 集合中添加一条记录：<br>';
                suggestionHtml += '   <code>{"salesId":"admin","phone":"admin","password":"admin123","level":0}</code><br><br>';
                suggestionHtml += '5️⃣ <strong>网络环境</strong><br>';
                suggestionHtml += '   尝试关闭浏览器扩展，或使用无痕模式访问';
                
                showSuggestion(suggestionHtml);
                
                let errorMsg = '';
                if (err.message && err.message.includes('scope')) {
                    errorMsg = '数据库连接失败：请检查安全域名配置（最常见原因）';
                } else if (err.message && err.message.includes('permission')) {
                    errorMsg = '权限不足，请检查数据库权限设置';
                } else {
                    errorMsg = err.message || '未知错误';
                }
                showError('初始化失败：' + errorMsg);
                setButtonEnabled(false);
                return false;
            }
        }

        async function login() {
            if (!isReady) {
                showError('系统未就绪，请稍后再试或刷新页面');
                return;
            }
            
            const phone = document.getElementById('phone').value.trim();
            const pwd = document.getElementById('password').value.trim();
            if (!phone || !pwd) {
                showError('请输入手机号和密码');
                return;
            }
            
            setButtonEnabled(false);
            showInfo('登录中...');
            
            try {
                const res = await db.collection('sales').where({ phone: phone, password: pwd }).get();
                if (res.data.length > 0) {
                    const sales = res.data[0];
                    localStorage.setItem('salesId', sales.salesId);
                    localStorage.setItem('salesName', sales.name);
                    localStorage.setItem('salesLevel', sales.level);
                    if (sales.salesId === 'admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'salesman.html';
                    }
                } else {
                    showError('账号或密码错误');
                    setButtonEnabled(true);
                }
            } catch (err) {
                showDebug('登录失败: ' + (err.message || JSON.stringify(err)));
                showError('登录失败，请检查网络');
                setButtonEnabled(true);
            }
        }

        window.addEventListener('load', () => {
            showDebug('页面加载完成，开始初始化');
            initCloud();
        });
    </script>
</body>
</html>
