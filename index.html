<!DOCTYPE html>
<html>
<head>
    <title>云开发连接测试</title>
    <script src="https://web.sdk.qcloud.com/cloudbase/2.0.0/cloudbase.js"></script>
</head>
<body>
    <div id="result">测试中...</div>
    <script>
        const ENV_ID = 'good-reviews-3g35hh0i28b88e1b';
        const resultDiv = document.getElementById('result');
        
        (async () => {
            resultDiv.innerHTML = '等待 SDK...';
            if (typeof cloudbase === 'undefined') {
                resultDiv.innerHTML = 'SDK 加载失败';
                return;
            }
            resultDiv.innerHTML = 'SDK 已加载，初始化中...';
            try {
                const app = cloudbase.init({ env: ENV_ID });
                const db = app.database();
                resultDiv.innerHTML = '测试数据库连接...';
                const res = await db.collection('sales').limit(1).get();
                resultDiv.innerHTML = '✅ 成功！查到 ' + res.data.length + ' 条数据';
            } catch (err) {
                resultDiv.innerHTML = '❌ 失败：' + err.message;
                console.error(err);
            }
        })();
    </script>
</body>
</html>
