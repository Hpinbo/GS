<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>砚拓·销售系统登录</title>
    <script src="https://static.cloudbase.net/cloudbase-js-sdk/latest/cloudbase.full.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #f5f7fa; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: white; border-radius: 32px; padding: 32px; width: 100%; max-width: 360px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
        h2 { margin-bottom: 24px; text-align: center; color: #1e2a3a; }
        input { width: 100%; padding: 12px 16px; border: 1px solid #dce3ec; border-radius: 40px; margin-bottom: 16px; font-size: 1rem; }
        button { width: 100%; padding: 12px; background: #2c3e50; color: white; border: none; border-radius: 40px; font-size: 1rem; font-weight: 600; cursor: pointer; }
        button:disabled { background: #95a5a6; cursor: not-allowed; }
        .error { color: #e74c3c; text-align: center; margin-top: 12px; font-size: 0.9rem; }
        .info { color: #f39c12; text-align: center; margin-top: 12px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>销售系统登录</h2>
        <input type="text" id="phone" placeholder="手机号" autocomplete="off">
        <input type="password" id="password" placeholder="密码">
        <button id="loginBtn" onclick="login()">登录</button>
        <div id="errorMsg" class="error"></div>
        <div id="infoMsg" class="info"></div>
    </div>

    <script>
        const ENV_ID = 'good-reviews-3g35hh0i28b88e1b';
        let db = null;
        let initSuccess = false;

        async function init() {
            // 等待 SDK 加载（最多等待 6 秒）
            let waitCount = 0;
            while (typeof cloudbase === 'undefined' && waitCount < 30) {
                await new Promise(r => setTimeout(r, 200));
                waitCount++;
            }
            if (typeof cloudbase === 'undefined') {
                document.getElementById('errorMsg').innerText = 'SDK 加载失败，请刷新页面重试';
                document.getElementById('loginBtn').disabled = true;
                return;
            }
            try {
                // 显式指定区域，避免环境探测错误
                const app = cloudbase.init({ env: ENV_ID, region: 'ap-shanghai' });
                db = app.database();
                // 测试连接，使用 limit(1) 避免复杂查询
                await db.collection('sales').limit(1).get();
                initSuccess = true;
                document.getElementById('loginBtn').disabled = false;
                document.getElementById('infoMsg').innerText = '✅ 系统已就绪';
                setTimeout(() => document.getElementById('infoMsg').innerText = '', 2000);
            } catch (err) {
                console.error(err);
                let msg = err.message || '';
                if (msg.includes('scope')) {
                    msg = '请检查安全域名配置：云开发控制台 → 安全配置 → 安全域名，添加 hpinbo.github.io';
                } else if (msg.includes('permission')) {
                    msg = '数据库权限不足，请检查集合权限为自定义规则 { "read": true, "write": true }';
                } else {
                    msg = '初始化失败：' + msg;
                }
                document.getElementById('errorMsg').innerText = msg;
                document.getElementById('loginBtn').disabled = true;
            }
        }

        async function login() {
            if (!initSuccess) {
                document.getElementById('errorMsg').innerText = '系统未就绪，请稍后再试';
                return;
            }
            const phone = document.getElementById('phone').value.trim();
            const pwd = document.getElementById('password').value.trim();
            if (!phone || !pwd) {
                document.getElementById('errorMsg').innerText = '请输入手机号和密码';
                return;
            }
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.innerText = '登录中...';
            try {
                const res = await db.collection('sales').where({ phone: phone, password: pwd }).get();
                if (res.data.length > 0) {
                    const sales = res.data[0];
                    localStorage.setItem('salesId', sales.salesId);
                    localStorage.setItem('salesName', sales.name);
                    localStorage.setItem('salesLevel', sales.level);
                    if (sales.salesId === 'admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'salesman.html';
                    }
                } else {
                    document.getElementById('errorMsg').innerText = '账号或密码错误';
                    btn.disabled = false;
                    btn.innerText = '登录';
                }
            } catch (err) {
                console.error(err);
                document.getElementById('errorMsg').innerText = '登录失败，请检查网络';
                btn.disabled = false;
                btn.innerText = '登录';
            }
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
